<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 1 - Table</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body class="bg-light my-5">

  <h3 class="text-center text-danger">Bảng Thành Phần Dinh Dưỡng</h3>
  <div class="container d-flex justify-content-center mt-3">

    <table class="table table-bordered text-center align-middle mt-3">

      <thead class="table">
        <tr>
          <th rowspan="2" class="bg-warning">Thành phần</th>
          <th colspan="2" class="bg-warning">Giá trị</th>
        </tr>
        <tr>
          <th class="bg-warning">Khối lượng</th>
          <th class="bg-warning">% DV</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td class="text-start">Calories</td>
          <td>200 kcal</td>
          <td>20%</td>
        </tr>
        <tr>
          <td class="text-start">Chất béo</td>
          <td>9g</td>
          <td>14%</td>
        </tr>
        <tr>
          <td class="text-start">Chất béo bão hòa</td>
          <td>4g</td>
          <td>20%</td>
        </tr>
        <tr>
          <td class="text-start">Chất đạm</td>
          <td>8g</td>
          <td>16%</td>
        </tr>
        <tr>
          <td class="text-start">Chất xơ</td>
          <td>5g</td>
          <td>20%</td>
        </tr>
        <tr>
          <td class="text-start">Đường</td>
          <td>12g</td>
          <td>--</td>
        </tr>
        <tr>
          <td rowspan="2" class="text">Vitamin</td>
          <td>Vitamin C</td>
          <td>25%</td>
        </tr>
        <tr>
          <td>Vitamin D</td>
          <td>10%</td>
        </tr>
      </tbody>

    </table>

  </div>

</body>

</html>
