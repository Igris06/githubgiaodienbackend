<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 3 - Form với Tab (Bootstrap)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body class="bg-light py-5">

  <div class="container">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
      <div class="card-body">

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#register" type="button">Đăng
              Ký</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#login" type="button">Đăng Nhập</button>
          </li>
        </ul>

        <!-- Nội dung các tab -->
        <div class="tab-content">

          <!-- TAB 1: Đăng ký -->
          <div class="tab-pane fade show active" id="register">
            <h4 class="text-dark mb-3">Form Đăng Ký Thông Tin</h4>
            <form>
              <div class="mb-3">
                <label class="form-label">Họ và Tên</label>
                <input type="text" class="form-control" placeholder="Nhập họ và tên">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Nhập email">
              </div>
              <div class="mb-3">
                <label class="form-label">Số Điện Thoại</label>
                <input type="text" class="form-control" placeholder="Nhập số điện thoại">
              </div>
              <div class="mb-3">
                <label class="form-label">Mật Khẩu</label>
                <input type="password" class="form-control" placeholder="Nhập mật khẩu">
              </div>
              <div class="mb-3">
                <label class="form-label">Xác Nhận Mật Khẩu</label>
                <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
              </div>
              <div class="mb-3">
                <label class="form-label d-block">Giới Tính</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" checked>
                  <label class="form-check-label">Nam</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender">
                  <label class="form-check-label">Nữ</label>
                </div>
              </div>


              <div class="mb-3">
                <label class="form-label">Ngôn Ngữ</label>
                <select class="form-select">
                  <option>Tiếng Việt</option>
                  <option>English</option>
                </select>
              </div>
              <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="agree">
                <label for="agree" class="form-check-label">Tôi đồng ý với các điều khoản</label>
              </div>
              <div class="text-center">
                <button class="btn btn-primary btn-sm px-4">Đăng Ký</button>
              </div>
            </form>
          </div>

          <!-- TAB 2: Đăng nhập -->
          <div class="tab-pane fade" id="login">
            <h4 class="text-dark mb-3">Form Đăng Nhập</h4>
            <form>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Nhập email">
              </div>
              <div class="mb-3">
                <label class="form-label">Mật Khẩu</label>
                <input type="password" class="form-control" placeholder="Nhập mật khẩu">
              </div>
              <div class="text-center">
                <button class="btn btn-primary btn-sm px-4">Đăng Nhập</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
